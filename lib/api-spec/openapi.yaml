openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: AMX ERP Suite API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: dashboard
    description: Dashboard summaries
  - name: finance
    description: Finance & invoices
  - name: hr
    description: HR & payroll
  - name: inventory
    description: Inventory & products
  - name: projects
    description: Project management
  - name: analytics
    description: Analytics
  - name: notifications
    description: Notifications
  - name: forecast
    description: AI Demand Forecasting

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Auth
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out

  # Dashboard
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard KPI summary
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent activity feed
      responses:
        "200":
          description: Activity feed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /dashboard/revenue-chart:
    get:
      operationId: getRevenueChart
      tags: [dashboard]
      summary: Get monthly revenue chart data
      responses:
        "200":
          description: Revenue chart data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RevenueDataPoint"

  # Finance
  /finance/invoices:
    get:
      operationId: listInvoices
      tags: [finance]
      summary: List invoices
      responses:
        "200":
          description: Invoice list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invoice"
    post:
      operationId: createInvoice
      tags: [finance]
      summary: Create invoice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvoiceInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  /finance/invoices/{id}:
    get:
      operationId: getInvoice
      tags: [finance]
      summary: Get invoice
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"
    patch:
      operationId: updateInvoice
      tags: [finance]
      summary: Update invoice
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvoiceUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"
    delete:
      operationId: deleteInvoice
      tags: [finance]
      summary: Delete invoice
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /finance/transactions:
    get:
      operationId: listTransactions
      tags: [finance]
      summary: List transactions
      responses:
        "200":
          description: Transaction list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"
    post:
      operationId: createTransaction
      tags: [finance]
      summary: Create transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"

  /finance/summary:
    get:
      operationId: getFinanceSummary
      tags: [finance]
      summary: Finance summary (revenue, expenses, profit)
      responses:
        "200":
          description: Finance summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinanceSummary"

  # HR
  /hr/employees:
    get:
      operationId: listEmployees
      tags: [hr]
      summary: List employees
      responses:
        "200":
          description: Employee list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Employee"
    post:
      operationId: createEmployee
      tags: [hr]
      summary: Create employee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"

  /hr/employees/{id}:
    get:
      operationId: getEmployee
      tags: [hr]
      summary: Get employee
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Employee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
    patch:
      operationId: updateEmployee
      tags: [hr]
      summary: Update employee
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
    delete:
      operationId: deleteEmployee
      tags: [hr]
      summary: Delete employee
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /hr/payrolls:
    get:
      operationId: listPayrolls
      tags: [hr]
      summary: List payroll records
      responses:
        "200":
          description: Payroll list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payroll"
    post:
      operationId: createPayroll
      tags: [hr]
      summary: Create payroll entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PayrollInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payroll"

  /hr/summary:
    get:
      operationId: getHrSummary
      tags: [hr]
      summary: HR summary (headcount, departments)
      responses:
        "200":
          description: HR summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HrSummary"

  # Inventory
  /inventory/products:
    get:
      operationId: listProducts
      tags: [inventory]
      summary: List products
      responses:
        "200":
          description: Product list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [inventory]
      summary: Create product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /inventory/products/{id}:
    get:
      operationId: getProduct
      tags: [inventory]
      summary: Get product
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    patch:
      operationId: updateProduct
      tags: [inventory]
      summary: Update product
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [inventory]
      summary: Delete product
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /inventory/summary:
    get:
      operationId: getInventorySummary
      tags: [inventory]
      summary: Inventory summary (total items, low stock)
      responses:
        "200":
          description: Inventory summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventorySummary"

  # Projects
  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List projects
      responses:
        "200":
          description: Project list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get project
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    patch:
      operationId: updateProject
      tags: [projects]
      summary: Update project
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete project
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /projects/{projectId}/tasks:
    get:
      operationId: listTasks
      tags: [projects]
      summary: List tasks for project
      parameters:
        - in: path
          name: projectId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      tags: [projects]
      summary: Create task
      parameters:
        - in: path
          name: projectId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /projects/{projectId}/tasks/{taskId}:
    patch:
      operationId: updateTask
      tags: [projects]
      summary: Update task
      parameters:
        - in: path
          name: projectId
          required: true
          schema:
            type: integer
        - in: path
          name: taskId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    delete:
      operationId: deleteTask
      tags: [projects]
      summary: Delete task
      parameters:
        - in: path
          name: projectId
          required: true
          schema:
            type: integer
        - in: path
          name: taskId
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Analytics
  /analytics/overview:
    get:
      operationId: getAnalyticsOverview
      tags: [analytics]
      summary: Get analytics overview
      responses:
        "200":
          description: Analytics overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsOverview"

  /analytics/department-spending:
    get:
      operationId: getDepartmentSpending
      tags: [analytics]
      summary: Get spending by department
      responses:
        "200":
          description: Department spending
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DepartmentSpending"

  /analytics/project-status:
    get:
      operationId: getProjectStatusBreakdown
      tags: [analytics]
      summary: Get project status breakdown
      responses:
        "200":
          description: Project status breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StatusCount"

  # Notifications
  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List notifications
      responses:
        "200":
          description: Notification list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/{id}/read:
    patch:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark notification as read
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"

  /notifications/read-all:
    patch:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      responses:
        "200":
          description: All marked read

  # AI Forecasting
  /forecast/demand:
    get:
      operationId: getDemandForecast
      tags: [forecast]
      summary: Get AI demand forecast for products
      responses:
        "200":
          description: Demand forecast
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ForecastDataPoint"

  /forecast/revenue:
    get:
      operationId: getRevenueForecast
      tags: [forecast]
      summary: Get AI revenue forecast
      responses:
        "200":
          description: Revenue forecast
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RevenueDataPoint"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # Auth
    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    RegisterInput:
      type: object
      required: [name, email, password, role]
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
        role:
          type: string

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    User:
      type: object
      required: [id, name, email, role, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
        createdAt:
          type: string

    # Dashboard
    DashboardSummary:
      type: object
      required: [totalRevenue, totalExpenses, totalEmployees, openProjects, lowStockItems, pendingInvoices]
      properties:
        totalRevenue:
          type: number
        totalExpenses:
          type: number
        totalEmployees:
          type: integer
        openProjects:
          type: integer
        lowStockItems:
          type: integer
        pendingInvoices:
          type: integer

    ActivityItem:
      type: object
      required: [id, type, description, createdAt]
      properties:
        id:
          type: integer
        type:
          type: string
        description:
          type: string
        createdAt:
          type: string

    RevenueDataPoint:
      type: object
      required: [month, revenue, expenses]
      properties:
        month:
          type: string
        revenue:
          type: number
        expenses:
          type: number

    # Finance
    Invoice:
      type: object
      required: [id, invoiceNumber, clientName, amount, status, dueDate, createdAt]
      properties:
        id:
          type: integer
        invoiceNumber:
          type: string
        clientName:
          type: string
        amount:
          type: number
        status:
          type: string
        dueDate:
          type: string
        createdAt:
          type: string
        description:
          type: ["string", "null"]

    InvoiceInput:
      type: object
      required: [invoiceNumber, clientName, amount, status, dueDate]
      properties:
        invoiceNumber:
          type: string
        clientName:
          type: string
        amount:
          type: number
        status:
          type: string
        dueDate:
          type: string
        description:
          type: string

    InvoiceUpdate:
      type: object
      properties:
        clientName:
          type: string
        amount:
          type: number
        status:
          type: string
        dueDate:
          type: string
        description:
          type: string

    Transaction:
      type: object
      required: [id, type, amount, category, description, date, createdAt]
      properties:
        id:
          type: integer
        type:
          type: string
        amount:
          type: number
        category:
          type: string
        description:
          type: string
        date:
          type: string
        createdAt:
          type: string

    TransactionInput:
      type: object
      required: [type, amount, category, description, date]
      properties:
        type:
          type: string
        amount:
          type: number
        category:
          type: string
        description:
          type: string
        date:
          type: string

    FinanceSummary:
      type: object
      required: [totalRevenue, totalExpenses, netProfit, invoicesPaid, invoicesPending]
      properties:
        totalRevenue:
          type: number
        totalExpenses:
          type: number
        netProfit:
          type: number
        invoicesPaid:
          type: integer
        invoicesPending:
          type: integer

    # HR
    Employee:
      type: object
      required: [id, name, email, department, position, salary, status, joinedAt, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        department:
          type: string
        position:
          type: string
        salary:
          type: number
        status:
          type: string
        joinedAt:
          type: string
        createdAt:
          type: string
        phone:
          type: ["string", "null"]

    EmployeeInput:
      type: object
      required: [name, email, department, position, salary, status, joinedAt]
      properties:
        name:
          type: string
        email:
          type: string
        department:
          type: string
        position:
          type: string
        salary:
          type: number
        status:
          type: string
        joinedAt:
          type: string
        phone:
          type: string

    EmployeeUpdate:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        department:
          type: string
        position:
          type: string
        salary:
          type: number
        status:
          type: string
        phone:
          type: string

    Payroll:
      type: object
      required: [id, employeeId, employeeName, month, year, grossSalary, deductions, netSalary, status, createdAt]
      properties:
        id:
          type: integer
        employeeId:
          type: integer
        employeeName:
          type: string
        month:
          type: integer
        year:
          type: integer
        grossSalary:
          type: number
        deductions:
          type: number
        netSalary:
          type: number
        status:
          type: string
        createdAt:
          type: string

    PayrollInput:
      type: object
      required: [employeeId, month, year, grossSalary, deductions, status]
      properties:
        employeeId:
          type: integer
        month:
          type: integer
        year:
          type: integer
        grossSalary:
          type: number
        deductions:
          type: number
        status:
          type: string

    HrSummary:
      type: object
      required: [totalEmployees, activeEmployees, departments, totalPayroll]
      properties:
        totalEmployees:
          type: integer
        activeEmployees:
          type: integer
        departments:
          type: integer
        totalPayroll:
          type: number

    # Inventory
    Product:
      type: object
      required: [id, name, sku, category, quantity, price, reorderLevel, status, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        sku:
          type: string
        category:
          type: string
        quantity:
          type: integer
        price:
          type: number
        reorderLevel:
          type: integer
        status:
          type: string
        createdAt:
          type: string
        description:
          type: ["string", "null"]

    ProductInput:
      type: object
      required: [name, sku, category, quantity, price, reorderLevel, status]
      properties:
        name:
          type: string
        sku:
          type: string
        category:
          type: string
        quantity:
          type: integer
        price:
          type: number
        reorderLevel:
          type: integer
        status:
          type: string
        description:
          type: string

    ProductUpdate:
      type: object
      properties:
        name:
          type: string
        category:
          type: string
        quantity:
          type: integer
        price:
          type: number
        reorderLevel:
          type: integer
        status:
          type: string
        description:
          type: string

    InventorySummary:
      type: object
      required: [totalProducts, totalValue, lowStockCount, outOfStockCount]
      properties:
        totalProducts:
          type: integer
        totalValue:
          type: number
        lowStockCount:
          type: integer
        outOfStockCount:
          type: integer

    # Projects
    Project:
      type: object
      required: [id, name, description, status, priority, startDate, endDate, budget, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        status:
          type: string
